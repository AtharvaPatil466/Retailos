apiVersion: v1
kind: Secret
metadata:
  name: retailos-secrets
  namespace: retailos
type: Opaque
stringData:
  # IMPORTANT: Replace these with real values before deploying.
  # In production, use sealed-secrets or external-secrets-operator.
  JWT_SECRET_KEY: "CHANGE-ME-in-production"
  DATABASE_URL: "postgresql://retailos:retailos@postgres:5432/retailos"
  REDIS_URL: "redis://redis:6379/0"
  ENCRYPTION_KEY: "CHANGE-ME-in-production"
  SENTRY_DSN: ""
