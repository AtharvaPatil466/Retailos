apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: retailos-ingress
  namespace: retailos
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/websocket-services: "retailos-api"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.retailos.example.com
      secretName: retailos-tls
  rules:
    - host: api.retailos.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: retailos-api
                port:
                  name: http
