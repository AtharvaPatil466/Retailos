apiVersion: v1
kind: Service
metadata:
  name: retailos-api
  namespace: retailos
  labels:
    app.kubernetes.io/name: retailos
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: retailos
    app.kubernetes.io/component: api
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
