apiVersion: v1
kind: Service
metadata:
  name: {{ include "retailos.fullname" . }}
  labels:
    {{- include "retailos.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "retailos.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
